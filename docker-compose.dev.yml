# Docker Compose for DuckBrain Development
# Usage: docker-compose -f docker-compose.dev.yml up --build

services:
  duckbrain-api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8490:8490"
    volumes:
      - duckbrain-data:/data
      - ./:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - DUCKBRAIN_DATA_DIR=/data
      - DUCKBRAIN_API_PORT=8490
      - DUCKBRAIN_UI_PORT=8989
    entrypoint: ["npx", "tsx", "bin/duckbrain.ts"]
    command: ["http", "--port=8490", "--bind-all"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8490/api/namespaces"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - duckbrain-net

  duckbrain-ui:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8989:8989"
    volumes:
      - ./:/app
      - /app/node_modules
      - ./packages/ui:/app/packages/ui
    environment:
      - NODE_ENV=development
      - DUCKBRAIN_API_PORT=8490
      - DUCKBRAIN_UI_PORT=8989
      - DUCKBRAIN_API_HOST=duckbrain-api
    working_dir: /app/packages/ui
    command: ["npx", "vite", "--port", "8989", "--host", "0.0.0.0"]
    depends_on:
      duckbrain-api:
        condition: service_healthy
    networks:
      - duckbrain-net

volumes:
  duckbrain-data:

networks:
  duckbrain-net:
    driver: bridge
